services:

  # 🕷️ CRAWLER
  crawler:
    build: .
    container_name: crawler_turismo_latam
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: tail -f /dev/null
    restart: "no"

  # 🧠 PROCESSOR (donde corre TODO el RAG)
  processor:
    build: .
    container_name: processor_rag
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: tail -f /dev/null
    depends_on:
      - ollama
      - opensearch
    restart: "no"

  # 🧠 OLLAMA (embeddings)
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama

  # 🗄️ OPENSEARCH (vector DB)
  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

volumes:
  ollama_data:
  opensearch_data:
