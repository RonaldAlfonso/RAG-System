services:

  # 🕷️ CRAWLER
  crawler:
    build: .
    container_name: crawler_turismo_latam
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: tail -f /dev/null
    restart: "no"

  # 🧠 PROCESSOR (donde corre TODO el RAG)
  processor:
    build: .
    container_name: processor_rag
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: tail -f /dev/null
    depends_on:
      - ollama
      - opensearch
    restart: "no"

  # 🌐 API (FastAPI)
  api:
    build: .
    container_name: rag_api
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/services
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      - opensearch
    restart: "no"

  # 🖥️ FRONTEND (Vue 3 + Quasar)
  frontend:
    image: node:20-alpine
    container_name: rag_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    command: sh -c "npm install && npx quasar dev"
    ports:
      - "9000:9000"
    environment:
      - API_TARGET=http://api:8000
    depends_on:
      - api
    restart: "no"

  # 🧠 OLLAMA (embeddings)
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama

  # 🗄️ OPENSEARCH (vector DB)
  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

volumes:
  ollama_data:
  opensearch_data:
  frontend_modules:
